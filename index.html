<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MidiAir</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ─────────────────────────── Themes ─────────────────────────── */
  :root, body.theme-hud {
    --bg-0: #05070a;
    --bg-1: #0a0d12;
    --ink: #e6edf3;
    --ink-dim: #7d8794;
    --accent: #6df1ff;
    --accent-soft: #b8f6ff;
    --accent-rgb: 109, 241, 255;
    --glow-rgb: 140, 225, 255;
    --hand-warm-rgb: 210, 150, 120;
    --hand-warm-rgb-2: 195, 140, 115;
    --keylight-rgb: 80, 140, 200;
    --keylight-alpha: 0.18;
    --grid-alpha: 0.20;
    --vignette-alpha: 0.55;
    --scanline-alpha: 0.025;
    --theme-tag: "OBSERVATION · HUD";
  }
  body.theme-command {
    --bg-0: #060306;
    --bg-1: #0e050a;
    --ink: #f5d0d8;
    --ink-dim: #7a3f4e;
    --accent: #c0243c;
    --accent-soft: #e05570;
    --accent-rgb: 192, 36, 60;
    --glow-rgb: 220, 60, 80;
    --hand-warm-rgb: 160, 40, 60;
    --hand-warm-rgb-2: 140, 30, 50;
    --keylight-rgb: 200, 40, 60;
    --keylight-alpha: 0.14;
    --grid-alpha: 0.20;
    --vignette-alpha: 0.70;
    --scanline-alpha: 0.030;
    --theme-tag: "COMMAND · TERMINAL";
  }
  body.theme-mono {
    --bg-0: #050608;
    --bg-1: #0a0b0e;
    --ink: #f5f0e8;
    --ink-dim: #6b6055;
    --accent: #fff4d6;
    --accent-soft: #ffedb8;
    --accent-rgb: 255, 244, 214;
    --glow-rgb: 255, 240, 200;
    --hand-warm-rgb: 165, 138, 90;
    --hand-warm-rgb-2: 148, 124, 82;
    --keylight-rgb: 235, 200, 140;
    --keylight-alpha: 0.13;
    --grid-alpha: 0.14;
    --vignette-alpha: 0.74;
    --scanline-alpha: 0.024;
    --theme-tag: "VOID · OPERATOR";
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg-0);
    color: var(--ink);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* ──────────── Scene backdrop (simulated camera feed) ──────────── */
  .scene {
    position: fixed; inset: 0;
    background:
      radial-gradient(120% 90% at 50% 110%, var(--bg-1) 0%, var(--bg-0) 60%, #000 100%);
    overflow: hidden;
  }
  .cam {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    filter: brightness(0.55) contrast(1.05) saturate(0.7) hue-rotate(-6deg);
    opacity: 0;
    transition: opacity 600ms ease;
    z-index: 1;
  }
  body.theme-command .cam { filter: brightness(0.50) contrast(1.1) saturate(0.55) sepia(0.35) hue-rotate(-12deg); }
  body.theme-mono    .cam { filter: brightness(0.50) contrast(1.15) saturate(0)    hue-rotate(0deg); }
  .cam.on { opacity: 1; }

  body.cam-on .hand, body.cam-on .finger { opacity: 0; transition: opacity 600ms ease; }
  body.cam-on .scene::before {
    background:
      radial-gradient(120% 80% at 50% 50%, transparent 0%, rgba(0,0,0,calc(var(--vignette-alpha) + 0.10)) 100%),
      repeating-linear-gradient(0deg, rgba(255,255,255,var(--scanline-alpha)) 0 1px, transparent 1px 3px);
  }
  .scene::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(120% 80% at 50% 50%, transparent 0%, rgba(0,0,0,var(--vignette-alpha)) 100%),
      repeating-linear-gradient(0deg, rgba(255,255,255,var(--scanline-alpha)) 0 1px, transparent 1px 3px);
    pointer-events: none;
    z-index: 3;
  }
  .hand {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px) saturate(0.55);
    opacity: 0.42;
    mix-blend-mode: screen;
  }
  .hand.left {
    width: 780px; height: 520px;
    left: 8%; bottom: -10%;
    background: radial-gradient(closest-side,
      rgba(var(--hand-warm-rgb), 0.55),
      rgba(var(--hand-warm-rgb), 0.20) 55%, transparent 75%);
  }
  .hand.right {
    width: 820px; height: 540px;
    right: 6%; bottom: -12%;
    background: radial-gradient(closest-side,
      rgba(var(--hand-warm-rgb-2), 0.50),
      rgba(var(--hand-warm-rgb-2), 0.18) 55%, transparent 75%);
  }
  .finger {
    position: absolute;
    width: 80px; height: 220px;
    border-radius: 50%;
    filter: blur(28px);
    background: radial-gradient(closest-side, rgba(var(--hand-warm-rgb), 0.32), transparent 70%);
    mix-blend-mode: screen;
  }
  .keylight {
    position: absolute;
    width: 1200px; height: 700px;
    left: 50%; top: -260px;
    transform: translate(calc(-50% + var(--keylight-x, 0px)), var(--keylight-y, 0px));
    background: radial-gradient(closest-side, rgba(var(--keylight-rgb), var(--keylight-alpha)), transparent 70%);
    filter: blur(40px);
    transition: transform 320ms cubic-bezier(.22,.61,.36,1);
  }
  .grid {
    position: absolute;
    left: 50%;
    bottom: -120px;
    width: 200vw;
    height: 60vh;
    transform: translateX(-50%) perspective(800px) rotateX(68deg);
    background-image:
      linear-gradient(rgba(var(--accent-rgb), calc(var(--grid-alpha) * 1.8)) 1px, transparent 1px),
      linear-gradient(90deg, rgba(var(--accent-rgb), calc(var(--grid-alpha) * 1.8)) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(closest-side at 50% 0%, #000 0%, transparent 75%);
    -webkit-mask-image: radial-gradient(closest-side at 50% 0%, #000 0%, transparent 75%);
    opacity: 0.85;
  }
  body.theme-mono .grid { background-size: 100px 100px; opacity: 0.80; }
  /* Grid horizon pulse — masked vertical column under the played key */
  .grid-pulse {
    position: absolute;
    left: 50%;
    bottom: -120px;
    width: 200vw;
    height: 60vh;
    transform: translateX(-50%) perspective(800px) rotateX(68deg);
    background-image:
      linear-gradient(rgba(var(--glow-rgb), 0.55) 1px, transparent 1px),
      linear-gradient(90deg, rgba(var(--glow-rgb), 0.55) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
    opacity: 0;
    z-index: 4;
  }

  /* ──────────────────────── HUD chrome ──────────────────────── */
  .topbar {
    position: fixed;
    top: 14px; left: 18px; right: 18px;
    z-index: 10;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-dim);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .topbar-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 18px;
    pointer-events: auto;
  }
  .topbar-row--voice {
    justify-content: center;
    display: flex;
    pointer-events: auto;
  }
  .topbar-row--voice:empty { display: none; }

  .zone { display: flex; align-items: center; gap: 12px; white-space: nowrap; }
  .zone-center { justify-self: center; gap: 12px; color: rgba(var(--accent-rgb), 0.70); flex-wrap: nowrap; }
  .zone-right  { justify-self: end; gap: 8px; }

  .topbar .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .topbar .sep { width: 1px; height: 11px; background: rgba(var(--accent-rgb), 0.20); flex-shrink: 0; }
  .topbar .title {
    color: var(--accent);
    letter-spacing: 0.30em;
    font-size: 12px;
    white-space: nowrap;
  }
  #hudStatus { color: var(--ink); letter-spacing: 0.20em; white-space: nowrap; }

  .readout { display: inline-flex; align-items: baseline; gap: 5px; white-space: nowrap; }
  .readout i { font-style: normal; color: rgba(var(--accent-rgb), 0.50); font-size: 9px; letter-spacing: 0.22em; }
  .readout b { font-weight: 500; color: var(--ink); font-size: 11px; letter-spacing: 0.04em; min-width: 22px; text-align: right; font-variant-numeric: tabular-nums; }
  .readout u { text-decoration: none; color: rgba(var(--accent-rgb), 0.40); font-size: 8.5px; letter-spacing: 0.20em; }

  .regime-tag { color: rgba(var(--accent-rgb), 0.65); font-size: 9px; letter-spacing: 0.24em; white-space: nowrap; }
  .regime-tag::before { content: var(--theme-tag); }

  .crosshair {
    width: 12px; height: 12px;
    border: 1px solid rgba(var(--accent-rgb), 0.55);
    position: relative;
  }
  .crosshair::before, .crosshair::after {
    content: ""; position: absolute; background: rgba(var(--accent-rgb), 0.55);
  }
  .crosshair::before { left: 50%; top: -3px; bottom: -3px; width: 1px; transform: translateX(-50%); }
  .crosshair::after  { top: 50%; left: -3px; right: -3px; height: 1px; transform: translateY(-50%); }

  /* Theme picker — monogram text buttons */
  .theme-picker {
    display: inline-flex;
    align-items: center;
    gap: 0;
    padding: 2px 4px;
    border: 1px solid rgba(var(--accent-rgb), 0.22);
    border-radius: 2px;
    background: rgba(var(--accent-rgb), 0.04);
  }
  .theme-btn {
    appearance: none;
    background: transparent;
    border: none;
    border-left: 1px solid rgba(var(--accent-rgb), 0.20);
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.20em;
    padding: 4px 8px 5px;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    transition: color 150ms ease;
  }
  .theme-btn:first-child { border-left: none; }
  .theme-btn:hover { color: var(--ink); }
  .theme-btn.active { color: var(--accent); }
  .theme-btn.active::after {
    content: ""; position: absolute;
    left: 6px; right: 6px; bottom: 1px;
    height: 1px;
    background: var(--accent);
    box-shadow: 0 0 6px rgba(var(--accent-rgb), 0.7);
  }

  .cam-btn {
    appearance: none;
    position: relative;
    background: rgba(var(--accent-rgb), 0.06);
    border: 1px solid rgba(var(--accent-rgb), 0.40);
    color: var(--accent-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    padding: 5px 9px;
    border-radius: 2px;
    cursor: pointer;
    overflow: visible;
    transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
  }
  .cam-btn:hover { background: rgba(var(--accent-rgb), 0.14); border-color: rgba(var(--accent-rgb), 0.75); }
  .cam-btn:hover::before {
    content: "";
    position: absolute;
    top: -4px; left: -4px;
    width: 8px; height: 8px;
    border-top: 1px solid rgba(var(--accent-rgb), 0.95);
    border-left: 1px solid rgba(var(--accent-rgb), 0.95);
    pointer-events: none;
  }
  .cam-btn:hover::after {
    content: "";
    position: absolute;
    bottom: -4px; right: -4px;
    width: 8px; height: 8px;
    border-bottom: 1px solid rgba(var(--accent-rgb), 0.95);
    border-right: 1px solid rgba(var(--accent-rgb), 0.95);
    pointer-events: none;
  }
  @keyframes camPulse {
    0%, 100% { box-shadow: 0 0 6px rgba(var(--accent-rgb), 0.30); }
    50%       { box-shadow: 0 0 16px rgba(var(--accent-rgb), 0.65), inset 0 0 8px rgba(var(--accent-rgb), 0.15); }
  }
  .cam-btn.active {
    background: rgba(var(--accent-rgb), 0.18);
    border-color: rgba(var(--accent-rgb), 0.85);
    color: #fff;
    animation: camPulse 2s ease-in-out infinite;
  }
  .cam-btn .led {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    margin-right: 7px;
    vertical-align: middle;
    transition: background 200ms ease, box-shadow 200ms ease;
  }
  .cam-btn.active .led { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* ── Voice picker (own row) ── */
  .voice-strip {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 6px 14px;
    border: 1px solid rgba(var(--accent-rgb), 0.18);
    background: rgba(var(--accent-rgb), 0.025);
    border-radius: 2px;
    position: relative;
  }
  /* corner brackets framing the voice strip */
  .voice-strip::before, .voice-strip::after {
    content: "";
    position: absolute;
    width: 7px; height: 7px;
    border-color: rgba(var(--accent-rgb), 0.70);
    border-style: solid;
    border-width: 0;
    pointer-events: none;
  }
  .voice-strip::before { top: -2px; left: -2px; border-top-width: 1px; border-left-width: 1px; }
  .voice-strip::after  { bottom: -2px; right: -2px; border-bottom-width: 1px; border-right-width: 1px; }
  .voice-pills { display: inline-flex; gap: 2px; }
  .voice-pill {
    appearance: none;
    position: relative;
    background: transparent;
    border: 1px solid rgba(var(--accent-rgb), 0.20);
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: color 140ms ease, border-color 140ms ease, background 140ms ease;
  }
  .voice-pill:hover { color: var(--ink); border-color: rgba(var(--accent-rgb), 0.55); }
  .voice-pill:hover::before, .voice-pill:hover::after,
  .voice-pill.active::before, .voice-pill.active::after {
    content: ""; position: absolute;
    width: 5px; height: 5px;
    border-color: rgba(var(--accent-rgb), 0.95);
    border-style: solid;
    border-width: 0;
    pointer-events: none;
  }
  .voice-pill:hover::before, .voice-pill.active::before {
    top: -3px; left: -3px; border-top-width: 1px; border-left-width: 1px;
  }
  .voice-pill:hover::after, .voice-pill.active::after {
    bottom: -3px; right: -3px; border-bottom-width: 1px; border-right-width: 1px;
  }
  .voice-pill.active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(var(--accent-rgb), 0.10);
  }
  .voice-sep { width: 1px; height: 14px; background: rgba(var(--accent-rgb), 0.20); }
  .voice-param { display: inline-flex; align-items: center; gap: 6px; }
  .voice-param label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: rgba(var(--accent-rgb), 0.55);
    text-transform: uppercase;
  }
  .voice-param .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.04em;
    color: var(--accent-soft);
    min-width: 22px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ──────────────────────── Custom cursor ──────────────────────── */
  body, * { cursor: none !important; }
  #customCursor {
    position: fixed;
    pointer-events: none;
    z-index: 99999;
    width: 28px; height: 28px;
    transform: translate(-3px, -3px);
    transition: transform 80ms ease;
    will-change: left, top;
  }
  #customCursor::before {
    content: "";
    position: absolute;
    inset: 0;
    clip-path: polygon(0% 0%, 0% 82%, 28% 62%, 46% 100%, 60% 93%, 42% 56%, 78% 56%);
    background: rgba(var(--accent-rgb), 0.12);
    filter: drop-shadow(0 0 4px rgba(var(--glow-rgb), 0.35)) drop-shadow(0 0 1px rgba(var(--accent-rgb), 0.85));
    transition: background 120ms ease, filter 120ms ease;
  }
  #customCursor::after {
    position: absolute;
    top: 26px; left: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    color: rgba(var(--accent-rgb), 0.85);
    white-space: nowrap;
    display: none;
    letter-spacing: -0.02em;
  }
  #customCursor.cursor--hover {
    transform: translate(-3px, -3px) scale(1.15);
    transition: transform 120ms ease;
  }
  #customCursor.cursor--resize {
    transform: translate(-3px, -3px) scale(1.08);
  }
  #customCursor.cursor--hover::before {
    background: rgba(var(--accent-rgb), 0.32);
    filter: drop-shadow(0 0 8px rgba(var(--glow-rgb), 0.80)) drop-shadow(0 0 2px rgba(var(--accent-rgb), 0.95));
  }
  #customCursor.cursor--click {
    transform: translate(-3px, -3px) scale(0.82);
    transition: transform 60ms ease;
  }
  #customCursor.cursor--click::before {
    background: rgba(var(--accent-rgb), 0.55);
    filter: drop-shadow(0 0 10px rgba(var(--glow-rgb), 1.0));
  }
  #customCursor.cursor--resize::after {
    content: "←→";
    display: block;
  }
  #customCursor.cursor--drag::after {
    content: "⟺";
    display: block;
  }

  .cam-error {
    position: fixed;
    top: 64px; right: 24px;
    z-index: 11;
    padding: 10px 14px;
    border: 1px solid rgba(255,120,120,0.45);
    background: rgba(40,12,12,0.85);
    color: #ffd6d6;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    max-width: 280px;
    border-radius: 3px;
    backdrop-filter: blur(4px);
  }
  .gesture-status {
    position: fixed;
    bottom: 14px; left: 18px;
    z-index: 11;
    padding: 5px 9px;
    border: 1px solid rgba(var(--accent-rgb), 0.30);
    background: rgba(0,0,0,0.45);
    color: rgba(var(--accent-rgb), 0.85);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    border-radius: 2px;
    backdrop-filter: blur(4px);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 250ms ease, transform 250ms ease;
    pointer-events: none;
  }
  .gesture-status.show { opacity: 1; transform: translateY(0); }
  .gesture-status .dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse 1.6s ease-in-out infinite;
  }

  #fingerOverlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 6;
  }

  /* ──────────── Mini 88-key piano (range picker) ──────────── */
  .mini-piano {
    position: relative;
    width: min(1500px, 94vw);
    height: 34px;
    transition: transform 220ms ease;
  }
  .mini-whites {
    position: absolute; inset: 0;
    display: flex;
    gap: 0;
    border: 1px solid rgba(var(--accent-rgb), 0.20);
    border-radius: 2px;
    overflow: hidden;
    background: rgba(0,0,0,0.55);
  }
  .mini-white {
    flex: 1 1 0;
    background: rgba(255,255,255,0.04);
  }
  .mini-blacks {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .mini-black {
    position: absolute;
    top: 0; height: 60%;
    background: linear-gradient(180deg, rgba(0,0,0,0.92), rgba(0,0,0,0.70));
    border-left: 1px solid rgba(var(--accent-rgb), 0.18);
    border-right: 1px solid rgba(var(--accent-rgb), 0.18);
    border-bottom: 1px solid rgba(var(--accent-rgb), 0.26);
  }
  .mini-region {
    position: absolute;
    top: -6px; bottom: -6px;
    background: rgba(var(--accent-rgb), 0.14);
    border: 1px solid rgba(var(--accent-rgb), 0.65);
    border-radius: 3px;
    transition: background 200ms ease, border-color 200ms ease, box-shadow 200ms ease, left 80ms linear, width 80ms linear;
    pointer-events: none;
    z-index: 3;
    box-shadow: 0 0 12px 1px rgba(var(--accent-rgb), 0.25);
  }
  /* Brackets at corners — only visible when armed */
  .mini-region::before, .mini-region::after {
    content: ""; position: absolute;
    width: 10px; height: 10px;
    border: 1px solid var(--accent);
    opacity: 0;
    transition: opacity 200ms ease;
  }
  .mini-region::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
  .mini-region::after  { bottom: -5px; right: -5px; border-left: none; border-top: none; }
  .mini-region.armed {
    background: rgba(var(--accent-rgb), 0.22);
    border-color: var(--accent);
    animation: regionFlicker 0.6s steps(1) infinite;
  }
  .mini-region.armed::before, .mini-region.armed::after { opacity: 1; }
  @keyframes regionFlicker {
    0%, 100% { border-color: var(--accent); box-shadow: 0 0 18px 3px rgba(var(--accent-rgb), 0.50), inset 0 0 10px rgba(var(--accent-rgb), 0.18); }
    50%      { border-color: rgba(var(--accent-rgb), 0.55); box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.30); }
  }
  .mini-region.armed { animation-duration: 1.2s; animation-timing-function: ease-in-out; }
  /* Heartbeat — fires once per noteOn, scoped via JS-toggled class */
  @keyframes regionHeartbeat {
    0%   { box-shadow: 0 0 12px 1px rgba(var(--accent-rgb), 0.25); }
    30%  { box-shadow: 0 0 28px 6px rgba(var(--glow-rgb), 0.55), inset 0 0 14px rgba(var(--glow-rgb), 0.18); }
    100% { box-shadow: 0 0 12px 1px rgba(var(--accent-rgb), 0.25); }
  }
  .mini-region.beat { animation: regionHeartbeat 320ms ease-out; }
  body.theme-mono .mini-region.armed { background: rgba(255,255,255,0.22); }

  .mini-octave-tick {
    position: absolute;
    top: 0;
    width: 1px;
    height: 100%;
    background: rgba(var(--accent-rgb), 0.14);
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 2;
  }
  .mini-octave-tick.c4 {
    background: rgba(var(--accent-rgb), 0.55);
  }
  .mini-octave-tick.c4.cN::after {
    color: rgba(var(--accent-rgb), 0.78);
    font-weight: 500;
  }
  .mini-piano-wrap {
    display: flex; flex-direction: column; align-items: stretch; gap: 22px;
    width: min(1500px, 94vw);
  }
  .mini-meta {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink-dim);
    white-space: nowrap;
  }
  .mini-meta .group { display: inline-flex; gap: 10px; align-items: center; white-space: nowrap; }
  .mini-meta .val { color: var(--accent-soft); }
  .mini-meta .hint { color: var(--ink-dim); letter-spacing: 0.24em; }
  .mini-meta .hint.live { color: var(--accent-soft); }

  /* ──────────────────────── Keyboard ──────────────────────── */
  .stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px;
    padding: 110px 0 20px;
    z-index: 5;
    pointer-events: none;
  }
  .stage > * { pointer-events: auto; }
  .keyboard {
    position: relative;
    width: min(1500px, 94vw);
    height: clamp(180px, 28vh, 420px);
    transition: height 220ms ease;
  }

  /* White keys */
  .whites {
    position: absolute; inset: 0;
    display: flex;
    gap: 2px;
  }
  .white {
    flex: 1 1 0;
    position: relative;
    border-radius: 1px 1px 6px 6px;
    background:
      linear-gradient(180deg,
        rgba(255,255,255,0.16) 0%,
        rgba(255,255,255,0.10) 40%,
        rgba(255,255,255,0.06) 100%);
    border: 1px solid rgba(255,255,255,0.22);
    border-top: 1px solid rgba(var(--accent-rgb), 0.45);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    transition: background 120ms ease, border-color 120ms ease, box-shadow 300ms ease-out, flex 80ms linear;
    cursor: pointer;
    overflow: visible;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -10px 24px rgba(0,0,0,0.30);
  }
  .white::after {
    content: "";
    position: absolute;
    left: 6px; right: 6px; top: 1px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
    pointer-events: none;
  }
  .white.hover {
    background:
      linear-gradient(180deg,
        rgba(255,255,255,0.24) 0%,
        rgba(255,255,255,0.16) 40%,
        rgba(255,255,255,0.10) 100%);
    border-color: rgba(255,255,255,0.34);
  }
  .white.glow {
    background:
      linear-gradient(180deg,
        rgba(var(--glow-rgb), 0.55) 0%,
        rgba(var(--glow-rgb), 0.38) 50%,
        rgba(var(--glow-rgb), 0.26) 100%);
    border-color: rgba(var(--glow-rgb), 0.90);
    box-shadow:
      0 0 14px 2px rgba(var(--glow-rgb), 0.55),
      0 0 38px 8px rgba(var(--accent-rgb), 0.50),
      0 0 90px 18px rgba(var(--accent-rgb), 0.35),
      inset 0 0 22px rgba(255,255,255,0.35);
  }
  /* Mono theme white-key glow: very white, no warm tint */
  body.theme-mono .white.glow {
    background:
      linear-gradient(180deg,
        rgba(255,255,255,0.65) 0%,
        rgba(255,255,255,0.40) 60%,
        rgba(255,255,255,0.28) 100%);
    border-color: rgba(255,255,255,0.95);
  }
  .white .label {
    position: absolute;
    left: 0; right: 0;
    bottom: 16px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.42);
    pointer-events: none;
    transition: color 200ms ease, text-shadow 200ms ease;
  }
  .white.glow .label {
    color: rgba(255,255,255,0.96);
    text-shadow: 0 0 8px rgba(var(--glow-rgb), 0.9);
  }
  .white .keybind {
    position: absolute;
    left: 0; right: 0;
    bottom: 34px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.22);
    pointer-events: none;
  }

  /* Black keys */
  .blacks {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .black {
    position: absolute;
    top: 0;
    height: 60%;
    border-radius: 1px 1px 5px 5px;
    background:
      linear-gradient(180deg, rgba(6,8,12,0.78) 0%, rgba(6,8,12,0.62) 100%);
    border: 1px solid rgba(var(--accent-rgb), 0.18);
    border-top: 1px solid rgba(var(--accent-rgb), 0.30);
    box-shadow:
      inset 0 -10px 14px rgba(0,0,0,0.55),
      inset 0 2px 2px rgba(255,255,255,0.06);
    transition: background 120ms ease, border-color 120ms ease, box-shadow 300ms ease-out, left 80ms linear, width 80ms linear;
    cursor: pointer;
    pointer-events: auto;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .black.hover {
    background:
      linear-gradient(180deg, rgba(20,26,34,0.78) 0%, rgba(18,24,32,0.62) 100%);
    border-color: rgba(var(--accent-rgb), 0.34);
  }
  .black.glow {
    background:
      linear-gradient(180deg,
        rgba(var(--accent-rgb), 0.62) 0%,
        rgba(var(--accent-rgb), 0.50) 50%,
        rgba(var(--accent-rgb), 0.40) 100%);
    border-color: rgba(var(--glow-rgb), 0.95);
    box-shadow:
      0 0 16px 3px rgba(var(--glow-rgb), 0.75),
      0 0 42px 8px rgba(var(--accent-rgb), 0.65),
      0 0 100px 20px rgba(var(--accent-rgb), 0.50),
      inset 0 -4px 10px rgba(0,0,0,0.35),
      inset 0 0 18px rgba(var(--glow-rgb), 0.45);
  }
  body.theme-mono .black.glow {
    background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(220,225,232,0.40) 100%);
    border-color: rgba(255,255,255,0.95);
  }
  .black .blabel {
    position: absolute;
    left: 0; right: 0;
    bottom: 10px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: rgba(200,235,250,0.0);
    pointer-events: none;
    transition: color 200ms ease;
  }
  .black.glow .blabel {
    color: rgba(255,255,255,0.96);
    text-shadow: 0 0 8px rgba(var(--glow-rgb), 0.95);
  }

  .octave-mark {
    position: absolute;
    top: calc(100% + 12px);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.28);
    transform: translateX(-50%);
  }
  .octave-mark.bright { color: var(--accent-soft); text-shadow: 0 0 6px rgba(var(--accent-rgb), 0.6); }

  /* keyboard frame brackets */
  .frame-bracket {
    position: absolute;
    width: 30px; height: 30px;
    border: 1px solid rgba(var(--accent-rgb), 0.72);
    pointer-events: none;
    transition: border-color 200ms ease;
  }
  .frame-bracket.tl { top: -16px; left: -16px; border-right: none; border-bottom: none; }
  .frame-bracket.tr { top: -16px; right: -16px; border-left: none; border-bottom: none; }
  .frame-bracket.bl { bottom: -16px; left: -16px; border-right: none; border-top: none; }
  .frame-bracket.br { bottom: -16px; right: -16px; border-left: none; border-top: none; }
  body.gesture-active .frame-bracket { border-color: rgba(var(--accent-rgb), 0.95); }
  body.theme-mono .frame-bracket { border-color: rgba(var(--accent-rgb), 0.95); filter: drop-shadow(0 0 1px rgba(0,0,0,0.9)); }

  .tracking {
    position: absolute;
    top: -28px; left: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(var(--accent-rgb), 0.55);
  }
  .tracking::before {
    content: "● ";
    color: rgba(var(--accent-rgb), 0.85);
  }
  .signal {
    position: absolute;
    top: -28px; right: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(var(--accent-rgb), 0.55);
  }
  .signal b { color: var(--accent-soft); font-weight: 500; font-variant-numeric: tabular-nums; }

  /* ────────────────── Range input ────────────────── */
  input[type="range"] {
    accent-color: var(--accent);
    outline: none;
  }
  /* Horizontal sliders (VoiceHUD params) */
  input[type="range"].slider-h {
    -webkit-appearance: none;
    appearance: none;
    height: 18px;
    background: transparent;
  }
  input[type="range"].slider-h::-webkit-slider-runnable-track {
    height: 2px;
    background: rgba(var(--accent-rgb), 0.20);
    border-radius: 2px;
  }
  input[type="range"].slider-h::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    margin-top: -4px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 5px rgba(var(--accent-rgb), 0.50);
    transition: box-shadow 120ms ease;
  }
  input[type="range"].slider-h:hover::-webkit-slider-thumb {
    box-shadow: 0 0 9px rgba(var(--accent-rgb), 0.85);
  }
  input[type="range"].slider-h::-moz-range-track {
    height: 2px;
    background: rgba(var(--accent-rgb), 0.20);
    border-radius: 2px; border: none;
  }
  input[type="range"].slider-h::-moz-range-thumb {
    width: 10px; height: 10px;
    border: none; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 5px rgba(var(--accent-rgb), 0.50);
  }

  @media (max-width: 720px) {
    .footer { font-size: 9px; gap: 10px; }
  }

  /* ──────────────────────── New v2 chrome ──────────────────────── */

  /* Detection flanks — segmented LED bars, threshold tick, peak hold */
  .flank-head {
    display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.30em;
    text-transform: uppercase;
    color: rgba(var(--accent-rgb), 0.45);
  }
  .flank-head--toggle {
    cursor: pointer;
    user-select: none;
    transition: color 140ms ease;
  }
  .flank-head--toggle:hover { color: rgba(var(--accent-rgb), 0.85); }
  .flank-head--toggle:focus-visible { outline: 1px solid rgba(var(--accent-rgb), 0.55); outline-offset: 2px; }
  .flank-head .chev {
    display: inline-block;
    width: 6px; height: 6px;
    border-right: 1px solid currentColor;
    border-bottom: 1px solid currentColor;
    transform: rotate(-45deg);
    margin-right: 2px;
    transition: transform 200ms cubic-bezier(.22,.61,.36,1);
  }
  .flank-head .chev.open { transform: rotate(45deg); }
  .flank-head .rule { flex: 1; height: 1px; background: rgba(var(--accent-rgb), 0.14); }
  .flank-bars { display: flex; gap: 2px; align-items: flex-end; }
  .flank-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .flank-bar {
    position: relative;
    width: 12px;
    height: 110px;
    background: transparent;
    overflow: hidden;
  }
  /* solid bar that grows/shrinks — no rail, no segmentation */
  .flank-bar .fill {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 0%;
    background: rgba(var(--accent-rgb), 0.55);
    transition: height 100ms cubic-bezier(.22,.61,.36,1), background 80ms ease;
  }
  /* threshold hairline */
  .flank-bar .thr {
    position: absolute;
    left: -2px; right: -2px;
    height: 1px;
    background: rgba(var(--glow-rgb), 0.95);
    box-shadow: 0 0 4px rgba(var(--glow-rgb), 0.80);
    pointer-events: none;
    transition: bottom 60ms ease;
  }
  .flank-bar .thr::before, .flank-bar .thr::after {
    content: ""; position: absolute;
    top: 0; width: 3px; height: 1px;
    background: var(--accent);
  }
  .flank-bar .thr::before { left: 0; }
  .flank-bar .thr::after  { right: 0; }
  /* peak hold dash */
  .flank-bar .peak {
    position: absolute;
    left: 2px; right: 2px;
    height: 1px;
    background: rgba(var(--glow-rgb), 0.95);
    pointer-events: none;
    opacity: 0;
    transition: opacity 320ms ease, bottom 80ms linear;
  }
  .flank-bar.armed .fill {
    background: rgba(var(--glow-rgb), 0.95);
    box-shadow: inset 0 0 14px rgba(var(--glow-rgb), 0.45);
  }
  .flank-bar.armed { /* no border so the bar reads as a clean solid */ }
  .flank-bar.armed .thr { background: rgba(var(--glow-rgb), 0.95); }
  .flank-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.06em;
    color: rgba(var(--accent-rgb), 0.40);
  }
  .flank-sliders {
    display: flex; gap: 2px;
    max-height: 70px;
    overflow: hidden;
    opacity: 1;
    transition: max-height 280ms cubic-bezier(.22,.61,.36,1), opacity 220ms ease;
  }
  .flank-sliders.collapsed {
    max-height: 0;
    opacity: 0;
    pointer-events: none;
  }

  /* Custom vertical slider — segmented track, accent thumb */
  .vslider {
    position: relative;
    width: 12px;
    height: 70px;
    display: block;
  }
  .vslider-bg {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg,
        transparent 0 4px,
        rgba(var(--accent-rgb), 0.18) 4px 5px);
    border-top: 1px solid rgba(var(--accent-rgb), 0.18);
    border-bottom: 1px solid rgba(var(--accent-rgb), 0.18);
    pointer-events: none;
  }
  .vslider-bg::before {
    /* center rail */
    content: "";
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 1px;
    transform: translateX(-50%);
    background: rgba(var(--accent-rgb), 0.22);
  }
  .vslider-fill {
    position: absolute;
    left: 50%; bottom: 0;
    width: 3px;
    transform: translateX(-50%);
    background: linear-gradient(180deg,
      rgba(var(--glow-rgb), 0.85),
      rgba(var(--accent-rgb), 0.55));
    pointer-events: none;
    transition: height 80ms ease, box-shadow 120ms ease;
    box-shadow: 0 0 4px rgba(var(--accent-rgb), 0.5);
  }
  .vslider-thumb {
    position: absolute;
    left: 50%;
    width: 9px; height: 3px;
    transform: translate(-50%, 50%);
    background: var(--accent);
    box-shadow:
      0 0 6px rgba(var(--glow-rgb), 0.75),
      0 0 2px rgba(var(--accent-rgb), 0.95),
      inset 0 1px 0 rgba(255,255,255,0.40);
    pointer-events: none;
    transition: bottom 80ms ease;
  }
  .vslider-thumb::before, .vslider-thumb::after {
    /* tiny side notches for HUD signature */
    content: "";
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 2px; height: 2px;
    background: rgba(var(--glow-rgb), 0.95);
  }
  .vslider-thumb::before { left: -3px; }
  .vslider-thumb::after  { right: -3px; }
  .vslider:hover .vslider-thumb {
    background: var(--accent-soft, var(--accent));
    box-shadow: 0 0 10px rgba(var(--glow-rgb), 0.95), inset 0 1px 0 rgba(255,255,255,0.60);
  }
  .vslider-input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    opacity: 0;
    cursor: ns-resize;
    writing-mode: vertical-lr;
    direction: rtl;
    -webkit-appearance: slider-vertical;
    appearance: slider-vertical;
  }
  /* Flank corner mark (single bracket per flank, subtle) */
  .flank-wrap {
    position: relative;
    flex-shrink: 0;
    display: flex; flex-direction: column; gap: 8px;
    justify-content: flex-end;
    padding-bottom: 4px;
  }
  .flank-wrap.lh::before {
    content: "";
    position: absolute;
    bottom: -8px; left: -10px;
    width: 12px; height: 12px;
    border-bottom: 1px solid rgba(var(--accent-rgb), 0.55);
    border-left: 1px solid rgba(var(--accent-rgb), 0.55);
  }
  .flank-wrap.rh::before {
    content: "";
    position: absolute;
    bottom: -8px; right: -10px;
    width: 12px; height: 12px;
    border-bottom: 1px solid rgba(var(--accent-rgb), 0.55);
    border-right: 1px solid rgba(var(--accent-rgb), 0.55);
  }

  /* Finger → key beams (per played note, lifetime ~220ms) */
  .beam-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 7;
  }
  .beam {
    position: absolute;
    width: 2px;
    margin-left: -1px;
    background: linear-gradient(180deg,
      rgba(var(--glow-rgb), 0) 0%,
      rgba(var(--glow-rgb), 0.95) 14%,
      rgba(var(--glow-rgb), 0.95) 86%,
      rgba(var(--glow-rgb), 0) 100%);
    box-shadow: 0 0 8px rgba(var(--glow-rgb), 0.75), 0 0 18px rgba(var(--accent-rgb), 0.55);
    opacity: 0;
    animation: beamFlash 320ms cubic-bezier(.22,.61,.36,1);
    will-change: opacity;
  }
  @keyframes beamFlash {
    0%   { opacity: 0; }
    14%  { opacity: 1; }
    60%  { opacity: 0.85; }
    100% { opacity: 0; }
  }

  /* Octave-mark hairline drops */
  .octave-mark::before {
    content: "";
    position: absolute;
    left: 50%; top: -12px;
    width: 1px; height: 10px;
    background: rgba(var(--accent-rgb), 0.32);
    transform: translateX(-50%);
  }
  .octave-mark.bright::before { background: rgba(var(--accent-rgb), 0.85); box-shadow: 0 0 4px rgba(var(--accent-rgb), 0.65); }

  /* Mini-piano: faint octave label ribbon */
  .mini-octave-tick.cN::after {
    content: attr(data-label);
    position: absolute;
    top: calc(100% + 3px);
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.10em;
    color: rgba(var(--accent-rgb), 0.32);
    white-space: nowrap;
  }

  /* NowDisplay v2 — corner brackets when active, velocity ticks in history */
  .now-wrap {
    position: relative;
    display: flex; align-items: center; justify-content: center; gap: 18px;
    padding: 8px 26px;
    flex-shrink: 0;
    width: min(1500px, 94vw);
  }
  .now-now {
    position: relative;
    display: inline-flex; align-items: baseline; gap: 14px;
    padding: 6px 14px;
  }
  .now-now .corners span {
    position: absolute;
    width: 9px; height: 9px;
    border-color: var(--accent);
    border-style: solid;
    border-width: 0;
    opacity: 0;
    transition: opacity 200ms ease, transform 200ms cubic-bezier(.22,.61,.36,1);
  }
  .now-now .corners .tl { top: 0; left: 0; border-top-width: 1px; border-left-width: 1px; transform: translate(-4px, -4px); }
  .now-now .corners .tr { top: 0; right: 0; border-top-width: 1px; border-right-width: 1px; transform: translate(4px, -4px); }
  .now-now .corners .bl { bottom: 0; left: 0; border-bottom-width: 1px; border-left-width: 1px; transform: translate(-4px, 4px); }
  .now-now .corners .br { bottom: 0; right: 0; border-bottom-width: 1px; border-right-width: 1px; transform: translate(4px, 4px); }
  .now-now.active .corners span { opacity: 1; transform: translate(0,0); }
  .now-now.active .corners span { filter: drop-shadow(0 0 4px rgba(var(--accent-rgb), 0.8)); }

  .now-history { display: flex; gap: 12px; align-items: flex-end; }
  .now-history-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--accent-soft);
  }
  .now-history-tick {
    height: 1px;
    background: rgba(var(--accent-rgb), 0.85);
    transition: width 200ms ease, opacity 200ms ease;
  }
  .now-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.30em;
    text-transform: uppercase;
    color: rgba(var(--accent-rgb), 0.45);
    flex-shrink: 0;
  }

  /* Spectrum — futuristic EQ strip directly under keyboard */
  .spectrum-thin {
    width: 100%;
    height: 36px;
    position: relative;
    margin-top: 6px;
  }
  .spectrum-thin canvas { width: 100%; height: 100%; display: block; }
  .spectrum-thin::before {
    content: "";
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 8px;
    border-top: 1px solid rgba(var(--accent-rgb), 0.32);
    border-left: 1px solid rgba(var(--accent-rgb), 0.32);

<!-- Theme picker bootstrap (vanilla, runs immediately) -->
<script>
(() => {
  const VALID = new Set(["hud", "command", "mono"]);
  const KEY = "airPiano.theme.v1";
  function apply(theme) {
    if (!VALID.has(theme)) theme = "hud";
    // Work around a Chrome bug where transitions on properties using var() get stuck
    // when the variable changes. Temporarily disable transitions during the swap.
    const style = document.createElement("style");
    style.textContent = "*, *::before, *::after { transition: none !important; }";
    document.head.appendChild(style);
    document.body.classList.remove("theme-hud", "theme-command", "theme-mono");
    document.body.classList.add("theme-" + theme);
    // Force a reflow then re-enable transitions on the next frame
    void document.body.offsetWidth;
    requestAnimationFrame(() => { style.remove(); });
    document.querySelectorAll("#themePicker .theme-btn").forEach(el => {
      el.classList.toggle("active", el.dataset.theme === theme);
    });
    try { localStorage.setItem(KEY, theme); } catch (_) {}
    // Notify gesture layer so canvas drawing color updates
    window.dispatchEvent(new CustomEvent("airpiano:theme", { detail: theme }));
  }
  let saved = "mono";
  try { saved = localStorage.getItem(KEY) || "mono"; } catch (_) {}
  apply(saved);
  document.querySelectorAll("#themePicker .theme-btn").forEach(el => {
    el.addEventListener("click", () => apply(el.dataset.theme));
  });
  window.__airPianoSetTheme = apply;
})();
</script>

<!-- Custom cursor -->
<script>
(() => {
  const el = document.getElementById("customCursor");
  if (!el) return;
  document.addEventListener("mousemove", (e) => {
    el.style.left = e.clientX + "px";
    el.style.top  = e.clientY + "px";
  }, { passive: true });

  const HOVER_SEL = "button, input[type=range], [data-midi], .mini-piano, .mini-region, a, [tabindex]";
  document.addEventListener("mouseover", (e) => {
    const isHover  = !!e.target.closest(HOVER_SEL);
    const isResize = !!e.target.closest(".mini-piano, .mini-region");
    el.classList.toggle("cursor--hover",  isHover);
    el.classList.toggle("cursor--resize", isResize);
  });
  document.addEventListener("mousedown", (e) => {
    el.classList.add("cursor--click");
    if (e.target.closest(".mini-piano")) el.classList.add("cursor--drag");
  });
  document.addEventListener("mouseup", () => el.classList.remove("cursor--click", "cursor--drag"));
})();
</script>

<!-- Live HUD readouts: FPS, polyphony, latency drift -->
<script>
(() => {
  const $fps  = document.getElementById("hudFps");
  const $lat  = document.getElementById("hudLat");
  const $poly = document.getElementById("hudPoly");
  const $buf  = document.getElementById("hudBuf");
  let frames = 0, lastT = performance.now(), fps = 60;
  function loop(t) {
    frames++;
    if (t - lastT >= 500) {
      fps = (frames * 1000) / (t - lastT);
      frames = 0; lastT = t;
      if ($fps) $fps.textContent = fps.toFixed(0);
      // Latency wobble — synthetic, mirrors audio context base latency feel
      if ($lat) {
        const drift = 2.2 + Math.sin(t / 900) * 0.4 + Math.random() * 0.15;
        $lat.textContent = drift.toFixed(1);
      }
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  const playing = new Set();
  window.addEventListener("airpiano:noteon",  (e) => { playing.add(e.detail.midi); if ($poly) $poly.textContent = String(playing.size); });
  window.addEventListener("airpiano:noteoff", (e) => { playing.delete(e.detail.midi); if ($poly) $poly.textContent = String(playing.size); });

  // tracking/signal always-on default text
  const setSig = (n) => {
    const el = document.getElementById("signalInfo");
    if (el) el.innerHTML = `SIG <b>${n.toFixed(2)}</b>`;
  };
  const setTrk = (txt) => {
    const el = document.getElementById("trackingInfo");
    if (el) el.textContent = txt;
  };
  // Idle defaults until gesture layer overwrites
  setTrk("TRACK · STANDBY");
  setSig(0.00);
  // Light wobble on signal so it feels live
  setInterval(() => {
    const v = 0.12 + Math.random() * 0.06;
    setSig(v);
  }, 700);
})();
</script>
